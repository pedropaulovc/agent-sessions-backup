name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  hub:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hub/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  collector:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: collector
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run --script ../infra/cf/test_enroll_cert.py
      - run: uv sync
      - run: uv run pytest

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest

  # Migrate D1 then deploy the hub Worker, in that order, on merge to main. This is the SOLE deployer:
  # Cloudflare Workers Builds auto-deploy is turned OFF so nothing races us. Applying migrations before
  # `wrangler deploy` guarantees new code never runs against the old schema — the failure mode that
  # fired the agent-backup-parse-errors alert on 2026-07-22 (PR #51's migration 0013 shipped but was
  # never applied, so every ingest threw `D1_ERROR: no such column`). Gated on the hub tests (which
  # apply every migration via applyD1Migrations) so a broken migration never reaches prod.
  # Requires repo secret CLOUDFLARE_API_TOKEN with, on this account: D1, Workers Scripts, Queues,
  # Workers R2 Storage, Workers KV Storage (Edit) + Account Settings (Read); and on the vza.net zone:
  # Workers Routes (Edit). account_id comes from wrangler.jsonc.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: hub
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hub/package-lock.json
      - run: npm ci
      - run: npx wrangler d1 migrations apply sessions-index --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
